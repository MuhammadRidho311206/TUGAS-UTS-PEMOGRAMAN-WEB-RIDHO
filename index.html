<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DODO Website</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-blue-100 overflow-hidden">
    <!-- BACKGROUND -->
    <div
      class="absolute w-80 h-80 bg-blue-300 rounded-full blur-3xl opacity-40 top-0 right-0"
    ></div>
    <div
      class="absolute w-80 h-80 bg-indigo-400 rounded-full blur-3xl opacity-40 bottom-0 left-0"
    ></div>

    <!-- HERO -->
    <section class="text-center pt-20 relative z-10">
      <h1 class="text-4xl font-bold text-blue-800 mb-3">Halo, aku Ridho 👋</h1>

      <p class="text-blue-600 max-w-xl mx-auto mb-8">
        Selamat datang di website pribadiku. Tempat untuk berbagi cerita,
        pengalaman, dan juga perjalanan karierku 🚀
      </p>
    </section>

    <!-- CARD -->
    <section class="flex justify-center relative z-10">
      <div class="bg-white shadow-xl rounded-3xl p-8 max-w-4xl w-full mx-6">
        <div class="flex flex-col items-center">
          <!-- FOTO -->
          <div class="relative mb-6">
            <img
              src="FOTO/foto 1.jpg"
              alt="Foto Ridho"
              class="w-48 h-48 object-cover rounded-full border-4 border-blue-400 shadow-lg"
            />

            <div
              class="absolute -bottom-2 -right-2 bg-blue-500 text-white text-sm px-3 py-1 rounded-full shadow"
            >
              Online
            </div>
          </div>

          <!-- DESKRIPSI -->
          <p class="text-gray-600 text-center max-w-md mb-6">
            Aku seorang mahasiswa yang tertarik dengan dunia teknologi dan
            programming. Aku suka belajar hal baru dan senang berorganisasi.
          </p>

          <!-- BUTTON -->
          <div class="flex flex-wrap gap-4 justify-center">
            <a
              href="cv.html"
              class="bg-blue-500 text-white px-6 py-2 rounded-full hover:bg-blue-600 transition"
            >
              CV
            </a>

            <a
              href="blog.html"
              class="bg-white border border-blue-500 text-blue-600 px-6 py-2 rounded-full hover:bg-blue-100 transition"
            >
              Blog
            </a>

            <a
              href="contact.html"
              class="bg-white border border-blue-500 text-blue-600 px-6 py-2 rounded-full hover:bg-blue-100 transition"
            >
              Contact
            </a>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
