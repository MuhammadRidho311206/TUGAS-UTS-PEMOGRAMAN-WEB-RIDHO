<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact DODO</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-blue-100">
    <!-- Background -->
    <div
      class="absolute w-80 h-80 bg-blue-300 rounded-full blur-3xl opacity-30 top-0 left-0"
    ></div>
    <div
      class="absolute w-80 h-80 bg-indigo-400 rounded-full blur-3xl opacity-30 bottom-0 right-0"
    ></div>

    <!-- HEADER -->
    <section class="text-center pt-16 pb-10 relative z-10">
      <h1 class="text-4xl font-bold text-blue-800 mb-3">Hubungi Saya 📬</h1>
      <p class="text-blue-600 max-w-xl mx-auto">
        Jika ingin berkomunikasi atau bekerja sama, silakan kirim pesan melalui
        form di bawah ini.
      </p>

      <a
        href="index.html"
        class="inline-block mt-6 bg-blue-500 text-white px-6 py-2 rounded-full hover:bg-blue-600 transition"
      >
        ⬅ Kembali
      </a>
    </section>

    <!-- CONTENT -->
    <section class="relative z-10 px-6 pb-16">
      <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-6">
        <!-- INFO KONTAK -->
        <div class="bg-white rounded-2xl shadow-lg p-6 space-y-4">
          <h2 class="text-xl font-bold text-blue-700">Informasi Kontak</h2>

          <p class="text-gray-600">
            Silakan hubungi saya melalui informasi berikut:
          </p>

          <div class="space-y-2 text-gray-700">
            <p>📧 Email: dodowidodo1055@gmail.com</p>
            <p>📱 No HP: 085796051797</p>
            <p>📍 Alamat: Samarinda, Kalimantan Timur</p>
          </div>
        </div>

        <!-- FORM -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
          <h2 class="text-xl font-bold text-blue-700 mb-4">Kirim Pesan</h2>

          <form class="space-y-4">
            <div>
              <label class="text-sm text-gray-600">Nama</label>
              <input
                type="text"
                placeholder="Masukkan nama"
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
              />
            </div>

            <div>
              <label class="text-sm text-gray-600">Email</label>
              <input
                type="email"
                placeholder="Masukkan email"
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
              />
            </div>

            <div>
              <label class="text-sm text-gray-600">Pesan</label>
              <textarea
                rows="4"
                placeholder="Tulis pesan..."
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
              ></textarea>
            </div>

            <button
              type="submit"
              class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition"
            >
              Kirim Pesan
            </button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
